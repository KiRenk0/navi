case_spec:
  theta_names: [mach, alpha]
  theta_units: [1, deg]
  theta_bounds:
    mach: [8.3, 8.3]
    alpha: [2.2, 2.2]

  theta_sampling:
    method: grid
    grid_size: [1, 1]

  fixed:
    # Paper-style target altitude (meters)
    h_m: 56700

  gas:
    model: perfect_gas
    gamma: 1.4
    R_J_per_kgK: 287.0

  atmosphere:
    model: isa1976
    altitude_type: geometric

  viscosity:
    model: sutherland
    mu_ref_Pa_s: 1.716e-5
    T_ref_K: 273.15
    S_K: 110.4

  # Paper-faithful transition handling:
  # do not impose an engineering x/c cutoff ahead of the Eq. (2.46) criterion.
  transition_x_over_c: null

  # Cold-wall boundary (isothermal wall at 300 K)
  wall:
    model: fixed_temperature
    temperature_K: 300.0

  lf_qw_model:
    type: reference_enthalpy
    pr: 0.72
    h0_model: constant_cp
    transition:
      enable: true
      weighting: step
    stagnation:
      rn_unit: cm
      sweep_exponent_n: 1.0
    edge_model:
      type: busemann_shock_chain
      apply_surface: windward
      independence_principle:
        enable: true
        angle_unit: deg
        alpha_e_formula: atan( tan(alpha) / cos(chi_w) )
        mach_infty_e_formula: mach * sqrt(1 - sin(chi_w)^2 * cos(alpha)^2)
      cp_definition:
        formula: Cp = (p_e - p_infty)/(0.5*rho_infty*V_infty^2)
      pe_from_cp:
        formula: p_e = p_infty*(1 + 0.5*gamma*mach^2*Cp)
      state_chain:
        rho_c_over_rho_infty:
          formula: 1 + 5*((p_c/p_infty)-1)/((p_c/p_infty)+6)
        rho_e_over_rho_c:
          formula: (p_e/p_c)^(1/gamma)
        T_e_over_T_infty:
          formula: (p_e/p_infty)*(rho_infty/rho_e)
        mach_e2:
          formula: 5*((T_infty/T_e)*(1+0.2*mach^2)-1)
        V_e:
          formula: mach_e*sqrt(gamma*R*T_e)
      mu_e_model:
        formula: mu_e = sutherland(T_e)

  # IMPORTANT: omit tw_model (or use a non-radiative type) so the solver uses fixed wall temperature.

